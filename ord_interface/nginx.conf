events {
   worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log /var/log/nginx.log;

    gzip on;
    gzip_disable "msie6";

    upstream fastapi {
        server unix:/run/fastapi.sock max_fails=3 fail_timeout=60s;
    }

    upstream flask {
        server unix:/run/flask.sock max_fails=3 fail_timeout=60s;
    }

    server {
        listen 8080;

        location / {
            root /app/ord-interface/spa;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Vite emits content-hashed asset filenames, so they can be cached
        # indefinitely.
        location /assets/ {
            root /app/ord-interface/spa;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # index.html points at the current hashed bundle, so it must always be
        # revalidated; otherwise clients keep loading a stale build until a hard
        # refresh.
        location = /index.html {
            root /app/ord-interface/spa;
            add_header Cache-Control "no-cache";
        }

        location /api/ {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /;
            proxy_connect_timeout 120;
            proxy_read_timeout 60;
            proxy_send_timeout 60;
            proxy_pass http://fastapi/;
            proxy_ignore_client_abort on;
        }

        location /editor/ {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /;
            proxy_connect_timeout 120;
            proxy_read_timeout 60;
            proxy_send_timeout 60;
            proxy_pass http://flask/editor/;
            proxy_ignore_client_abort on;
        }
    }
}
